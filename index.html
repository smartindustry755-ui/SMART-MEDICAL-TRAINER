<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SmartWorkBook</title>
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Plateforme d'apprentissage intelligente pour la réussite de vos examens." />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      // Capture and stash the PWA install prompt as early as possible
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        console.log('beforeinstallprompt event stashed in window.deferredPrompt');
        window.dispatchEvent(new CustomEvent('deferredpromptavailable', { detail: e }));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
